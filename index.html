<!DOCTYPE html>

<html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Cadastrar - Drip Store</title>
      <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header>
      <a href="#">
        <img src="./assets/logo-header.svg" alt="logo da loja">
        <span>Drip Store</span>
      </a>
    </header>
    <main>
      <form>
        <div class="form-title">
          <h1>Acesse sua Conta</h1>
          <p>Novo cliente? Então registre-se <a href="#">aqui</a>.</p>
        </div>
        <div class="form-inputs">
          <div>
            <label>Login *</label>
            <input type="email" placeholder="Insira seu login ou email">
          </div>
          <div>
            <label>Senha *</label>
            <input type="password" placeholder="Insira sua senha">
          </div>
        </div>
        <p><a href="#">Esqueci minha senha</a></p>
        <button>Acessar Conta</button>
        <div class="form-others">
          <p>Ou faça login com</p>
          <ul>
            <li>
              <a href="#">
                <img src="./assets/logo-gmail.svg" alt="ícone para login com o gmail">
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./assets/logo-facebook.svg" alt="ícone para login com o facebook">
              </a>
            </li>
          </ul>
        </div>
      </form>
    </main>
  </body>
</html>
